services:

  bash-runner:
    build: ./bash-runner

  c-runner:
    build: ./c-runner

  ada-runner:
    build: ./ada-runner

  manager:
    build: ./manager

    ports:
      - "8080:8080"

    # Socket de Docker: fuente de metricas reales (CPU/mem/estado) de los runners.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro