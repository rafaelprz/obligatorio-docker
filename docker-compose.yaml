services:

  bash-runner:
    build: ./bash-runner
    # Solo en la red interna: sin salida a internet, accesible solo desde el manager.
    networks:
      - backend
    # Endurecimiento: FS de solo lectura, sin capabilities, sin escalada de privilegios.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  c-runner:
    build: ./c-runner
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  ada-runner:
    build: ./ada-runner
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  manager:
    build: ./manager

    # backend: hablar con los runners por SSH. frontend: publicar el panel al host.
    networks:
      - backend
      - frontend

    ports:
      - "8080:8080"

    # Socket de Docker: fuente de metricas reales (CPU/mem/estado) de los runners.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Endurecimiento: FS de solo lectura, sin capabilities, sin escalada de privilegios.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  # Red interna de los runners: sin gateway al exterior (no pueden salir a internet)
  # y solo alcanzable por contenedores de la misma red (el manager).
  backend:
    internal: true
  # Puente que usa solo el manager para publicar el puerto 8080 al host.
  frontend:
